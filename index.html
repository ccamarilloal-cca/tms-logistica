<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <meta name="theme-color" content="#060d1a"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="ERP NAL"/>
  <title>ERP NAL — Nacional Autotransporte</title>
  <link rel="manifest" href="manifest.json"/>

  <!-- Apple Touch Icons (para iPhone/iPad) -->
  <link rel="apple-touch-icon" href="icon-192.png"/>

  <!-- ═══ ═══════════════════════════════════
       Reemplaza el texto entre comillas con tu URL real de Google Apps Script.
       Ejemplo: window.SHEETS_URL = "https://script.google.com/macros/s/ABC123.../exec";
  ════════════════════════════════════════════════════════════════════════════ -->
  <script>
    window.SHEETS_URL = "https://script.google.com/macros/s/AKfycbyz6PLdaldPiVCfuMx-ATxiilyZB_k0x5YPn1X8mxWqKyeXDgSy4OW3GeNERSVsqr0aSQ/exec ";
  </script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #060d1a; overflow-x: hidden; }
    #root { min-height: 100vh; }

    /* Scrollbar oscuro */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: #0a1628; }
    ::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 2px; }

    /* Inputs focus */
    input:focus, select:focus, textarea:focus { outline: none !important; border-color: #3b82f6 !important; }

    /* Splash screen mientras carga */
    #splash {
      position: fixed; inset: 0; background: #060d1a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      z-index: 9999; transition: opacity .4s;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    .splash-logo { font-size: 48px; }
    .splash-title { color: #f1f5f9; font-family: 'DM Sans', sans-serif; font-weight: 900; font-size: 22px; letter-spacing: -0.5px; }
    .splash-sub { color: #334155; font-family: sans-serif; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }
    .splash-bar { width: 180px; height: 3px; background: #1e293b; border-radius: 2px; overflow: hidden; margin-top: 8px; }
    .splash-progress { height: 100%; width: 0; background: #3b82f6; border-radius: 2px; animation: load 1.2s ease forwards; }
    @keyframes load { to { width: 100%; } }
  </style>
</head>
<body>

  <!-- Splash -->
  <div id="splash">
    <div class="splash-logo">🚚</div>
    <div class="splash-title">Nacional Autotransporte</div>
    <div class="splash-sub">ERP · TMS · Torre de Control</div>
    <div class="splash-bar"><div class="splash-progress"></div></div>
  </div>

  <div id="root"></div>

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel (transpila JSX en el navegador — válido para uso interno) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- App -->
  <script type="text/babel" src="app.jsx" data-presets="react"></script>

  <!-- Service Worker para modo offline / PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(() => console.log('SW registrado'))
          .catch(e => console.log('SW error:', e));
      });
    }
    // Ocultar splash cuando React monta
    window.addEventListener('load', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash');
        if (splash) splash.classList.add('hidden');
      }, 1400);
    });
  </script>
</body>
</html>
