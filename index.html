<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <meta name="theme-color" content="#060d1a"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="ERP NAL"/>
  <title>ERP NAL v5</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>

  <!-- ═══════════════════════════════════════════════════════════════
       PASO ÚNICO: PEGA AQUÍ TU URL DE APPS SCRIPT
       Reemplaza el texto entre las comillas con tu URL real
       Ejemplo: "https://script.google.com/macros/s/AKfyc.../exec"
  ════════════════════════════════════════════════════════════════ -->
  <script>
    window.SHEETS_URL = "https://script.google.com/macros/s/AKfycbymRDnJ-4YWmHfJDGnNB4tjUyxFiP19GpOwfpcqOfJc_59SZyP0vLr2GfCeBAhNnP2UXg/exec";
  </script>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#060d1a;overflow-x:hidden}
    #root{min-height:100vh}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:#0a1628}
    ::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:2px}
    input:focus,select:focus,textarea:focus{outline:none!important;border-color:#3b82f6!important}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    #splash{position:fixed;inset:0;background:#060d1a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:9999;transition:opacity .5s}
    #splash.hidden{opacity:0;pointer-events:none}
    .sp-bar{width:160px;height:3px;background:#1e293b;border-radius:2px;overflow:hidden;margin-top:6px}
    .sp-prog{height:100%;width:0;background:#3b82f6;border-radius:2px;animation:load 1.4s ease forwards}
    @keyframes load{to{width:100%}}
  </style>
</head>
<body>
  <div id="splash">
    <div style="font-size:44px">🚚</div>
    <div style="color:#f1f5f9;font-family:sans-serif;font-weight:900;font-size:20px;letter-spacing:-.5px">Nacional Autotransporte</div>
    <div style="color:#334155;font-family:sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase">ERP · TMS · Torre de Control v5</div>
    <div class="sp-bar"><div class="sp-prog"></div></div>
  </div>

  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" src="app.jsx" data-presets="react"></script>

  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
    }
    window.addEventListener('load',()=>{
      setTimeout(()=>{ const s=document.getElementById('splash'); if(s) s.classList.add('hidden'); },1600);
    });
  </script>
</body>
</html>
